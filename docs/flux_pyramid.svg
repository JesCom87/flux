<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1600" viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Colors -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1226"/>
      <stop offset="100%" stop-color="#0b0d1a"/>
    </linearGradient>
    <style><![CDATA[
      .title     { fill:#F3F6FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; }
      .subtitle  { fill:#BFD2FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; }
      .caption   { fill:#A9B4D0; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 500; }
      .label     { fill:#EAF0FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; }
      .small     { fill:#DCE6FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; }
      .boxtext   { fill:#EAF0FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; font-size:18px; }
      .layerText { fill:#EAF0FF; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; font-size:22px; }
      .bandTitle { fill:#111427; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; font-size:22px; }
      .pill      { fill:#1c2344; stroke:#5D75FF; stroke-width:2; }
      .band      { fill:#2a3366; stroke:#5D75FF; stroke-width:2; }
      .box       { fill:#1b2142; stroke:#5D75FF; stroke-width:2; rx:10; ry:10; }
      .legendBox { fill:#121735; stroke:#3E54FF; stroke-width:2; rx:10; ry:10; }
      .arrow     { stroke:#7EA2FF; stroke-width:3; marker-end:url(#arrowhead); }
      .divider   { stroke:#3E54FF; stroke-width:1.5; stroke-dasharray:6 4; }
      .soft      { opacity:0.85; }
    ]]></style>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#7EA2FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="1600" fill="url(#bg)"/>

  <!-- Header -->
  <g transform="translate(80,70)">
    <text class="title" style="font-size:44px;">Flux Pyramid — MachineOuterFace → UserInterFace</text>
    <text class="subtitle" y="40" style="font-size:22px;">
      Bare-Metal, Self-Hosted, Self-Contained • Small→Big • Low→High • Back→Front
    </text>
  </g>

  <!-- Side arrows (Back→Front, Low→High) -->
  <g>
    <line x1="1120" y1="1450" x2="1120" y2="220" class="arrow"/>
    <text x="1130" y="250" class="small" transform="rotate(-90 1130,250)">High (UserInterFace)</text>
    <text x="1130" y="1470" class="small" transform="rotate(-90 1130,1470)">Low (MachineOuterFace)</text>

    <line x1="100" y1="200" x2="1100" y2="200" class="arrow"/>
    <text x="110" y="190" class="small">Back (Machine)</text>
    <text x="930" y="190" class="small">Front (User)</text>
  </g>

  <!-- Pyramid bands (from bottom to top) -->
  <!-- 1. Bare-Metal / Boot (BIOS, Bootloader, MBR, Kernel, OS) -->
  <g transform="translate(100,1220)">
    <rect class="band soft" x="0" y="0" width="1000" height="260" rx="14" ry="14"/>
    <text class="bandTitle" x="20" y="36">Bare-Metal & Boot</text>
    <line x1="20" y1="50" x2="980" y2="50" class="divider"/>

    <!-- Boxes -->
    <g transform="translate(20,70)">
      <rect class="box" x="0"   y="0" width="180" height="70"/><text class="boxtext" x="20" y="42">BIOS / Firmware</text>
      <rect class="box" x="200" y="0" width="180" height="70"/><text class="boxtext" x="220" y="42">Bootloader</text>
      <rect class="box" x="400" y="0" width="180" height="70"/><text class="boxtext" x="430" y="42">MBR</text>
      <rect class="box" x="600" y="0" width="180" height="70"/><text class="boxtext" x="640" y="42">Kernel</text>
      <rect class="box" x="800" y="0" width="180" height="70"/><text class="boxtext" x="860" y="42">OS</text>

      <text class="layerText" x="0" y="130">MachineOuterFace: hardware init, memory map, device bring-up</text>
    </g>
  </g>

  <!-- 2. Language & Build: File, Module, Package, Library, Tool -->
  <g transform="translate(140,980)">
    <rect class="band soft" x="0" y="0" width="920" height="210" rx="14" ry="14"/>
    <text class="bandTitle" x="20" y="36">Language, Code & Build</text>
    <line x1="20" y1="50" x2="900" y2="50" class="divider"/>

    <g transform="translate(20,70)">
      <rect class="box" x="0"   y="0" width="160" height="60"/><text class="boxtext" x="20" y="37">File</text>
      <rect class="box" x="180" y="0" width="160" height="60"/><text class="boxtext" x="200" y="37">Module</text>
      <rect class="box" x="360" y="0" width="160" height="60"/><text class="boxtext" x="380" y="37">Package</text>
      <rect class="box" x="540" y="0" width="160" height="60"/><text class="boxtext" x="565" y="37">Library</text>
      <rect class="box" x="720" y="0" width="160" height="60"/><text class="boxtext" x="765" y="37">Tool</text>

      <text class="layerText" x="0" y="120">Compiler, Assembler, Linker, LSP, Test, Doc, Format</text>
    </g>
  </g>

  <!-- 3. Runtime & Product: Application, Framework, Platform, Stack, Ecosystem, Environment -->
  <g transform="translate(160,730)">
    <rect class="band soft" x="0" y="0" width="880" height="220" rx="14" ry="14"/>
    <text class="bandTitle" x="20" y="36">Runtime & Product Layers</text>
    <line x1="20" y1="50" x2="860" y2="50" class="divider"/>

    <g transform="translate(20,70)">
      <rect class="box" x="0"   y="0" width="160" height="60"/><text class="boxtext" x="25" y="37">Application</text>
      <rect class="box" x="180" y="0" width="160" height="60"/><text class="boxtext" x="205" y="37">Framework</text>
      <rect class="box" x="360" y="0" width="160" height="60"/><text class="boxtext" x="395" y="37">Platform</text>
      <rect class="box" x="540" y="0" width="160" height="60"/><text class="boxtext" x="585" y="37">Stack</text>
      <rect class="box" x="720" y="0" width="160" height="60"/><text class="boxtext" x="747" y="37">Ecosystem</text>

      <rect class="box" x="360" y="80" width="340" height="60"/><text class="boxtext" x="380" y="117">Environment (Runtime, Sandbox, VM)</text>
    </g>
  </g>

  <!-- 4. Connectivity: Database, Server, Network, Internet -->
  <g transform="translate(200,530)">
    <rect class="band soft" x="0" y="0" width="800" height="170" rx="14" ry="14"/>
    <text class="bandTitle" x="20" y="36">Connectivity & Data</text>
    <line x1="20" y1="50" x2="780" y2="50" class="divider"/>

    <g transform="translate(20,70)">
      <rect class="box" x="0"   y="0" width="180" height="60"/><text class="boxtext" x="35" y="37">Database</text>
      <rect class="box" x="200" y="0" width="180" height="60"/><text class="boxtext" x="245" y="37">Server</text>
      <rect class="box" x="400" y="0" width="180" height="60"/><text class="boxtext" x="430" y="37">Network</text>
      <rect class="box" x="600" y="0" width="180" height="60"/><text class="boxtext" x="635" y="37">Internet</text>
    </g>
  </g>

  <!-- 5. UserInterFace (Top cap) -->
  <g transform="translate(240,380)">
    <rect class="band soft" x="0" y="0" width="720" height="120" rx="14" ry="14"/>
    <text class="bandTitle" x="20" y="36">UserInterFace (HighFront)</text>
    <line x1="20" y1="50" x2="700" y2="50" class="divider"/>
    <text class="layerText" x="20" y="90">GUI • CLI • HMI • Apps • Experiences</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80,1480)">
    <rect class="legendBox" x="0" y="0" width="1040" height="80"/>
    <text class="caption" x="20" y="28">
      Reading order: Bottom → Top (Low→High, Back→Front). Build from Bare-Metal & Boot, then Language/Build,
      then Runtime/Product, then Connectivity, and finally UserInterFace.
    </text>
    <text class="caption" x="20" y="55">
      Flux goal: Bare-Metal, Self-Hosted, Self-Contained — Small→Big across the entire stack.
    </text>
  </g>
</svg>
